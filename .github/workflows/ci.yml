name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.17.0'  # match package.json engines
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node test/mock-test.js
      - run: node test/integration-test.js
      - run: node test/whole-schematic-test.js
      - name: Browser E2E test
        run: |
          # playwright-core ships without browsers; install chromium via @playwright/test runner
          # (only its postinstall step is needed, we don't import the package).
          npm install --no-save @playwright/test
          npx playwright install --with-deps chromium
          node test/browser-test.js
      - name: AI E2E test (skipped without API key)
        # ai-e2e-test.js calls a real OpenAI-compatible endpoint. CI has no key,
        # so this step is opt-in via the OPENAI_API_KEY repo/environment secret.
        if: ${{ env.OPENAI_API_KEY != '' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node test/ai-e2e-test.js
      - uses: actions/upload-artifact@v4
        with:
          name: extension-package
          path: build/dist/*.eext
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension-package
      - uses: softprops/action-gh-release@v2
        with:
          # Only attach the .eext that matches the tag name (e.g. v1.4.0 →
          # local-netlist-analyzer_v1.4.0.eext). Without this filter we'd ship
          # every historical .eext from build/dist/ in the release.
          files: local-netlist-analyzer_${{ github.ref_name }}.eext
          fail_on_unmatched_files: true
          generate_release_notes: true
