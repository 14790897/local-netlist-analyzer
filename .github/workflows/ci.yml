name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node test/mock-test.js
      - run: node test/integration-test.js
      - uses: actions/upload-artifact@v4
        with:
          name: extension-package
          path: build/dist/*.eext
          if-no-files-found: error

  e2e:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: extension-package
          path: build/dist
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install playwright-core
      - name: Restore EDA auth
        env:
          AUTH: ${{ secrets.EDA_AUTH_STATE }}
        run: |
          echo "$env:AUTH" > test/auth.json
      - name: E2E test
        run: node test/e2e-playwright.js
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-screenshots
          path: test/*.png

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension-package
      - uses: softprops/action-gh-release@v2
        with:
          files: '*.eext'
          generate_release_notes: true
