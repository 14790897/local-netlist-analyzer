name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Run mock test
        run: node test/mock-test.js

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-package
          path: build/dist/*.eext
          if-no-files-found: error

      - name: Extract extension info
        id: ext
        run: |
          EEXT_FILE=$(ls build/dist/*.eext | head -1)
          echo "file=${EEXT_FILE}" >> $GITHUB_OUTPUT
          echo "filename=$(basename ${EEXT_FILE})" >> $GITHUB_OUTPUT
          echo "Displaying eext content..."
          unzip -l "${EEXT_FILE}"

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension-package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.eext'
          generate_release_notes: true
