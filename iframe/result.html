<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>网表分析结果</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,Segoe UI,Microsoft YaHei,sans-serif;font-size:13px;color:#1a1a1a;background:#fff;padding:12px}
h2{margin:0 0 8px;font-size:16px;font-weight:600}
.summary{margin:0 0 12px;padding:8px 12px;background:#f0f5ff;border-radius:6px;font-size:12px;line-height:1.6}
.summary span{font-weight:600;color:#1a56db}
.actions{margin:0 0 12px;display:flex;gap:8px;flex-wrap:wrap}
.actions button{padding:4px 14px;border:1px solid #d1d5db;border-radius:4px;background:#fff;cursor:pointer;font-size:12px}
.actions button:hover{background:#f3f4f6}
.actions button.primary{background:#1a56db;color:#fff;border-color:#1a56db}
.actions button.primary:hover{background:#1e40af}
.actions button.success{background:#16a34a;color:#fff;border-color:#16a34a}
.actions button.success:hover{background:#15803d}

/* Tabs */
.tabs{display:flex;border-bottom:2px solid #e5e7eb;margin:0 0 12px}
.tab{padding:6px 16px;cursor:pointer;color:#6b7280;font-size:13px;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:#1a56db;border-bottom-color:#1a56db;font-weight:600}

/* Table */
.panel{display:none}
.panel.active{display:block}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f9fafb;padding:6px 10px;text-align:left;border:1px solid #e5e7eb;font-weight:600;position:sticky;top:0}
td{padding:5px 10px;border:1px solid #e5e7eb}
tr:hover{background:#f0f5ff}
.net-col{color:#1a56db;font-weight:500}
.comp-col{font-weight:600}
.pin-col{color:#6b7280}
.empty{margin:40px 0;text-align:center;color:#9ca3af;font-size:14px}
</style>
</head>
<body>

<h2>局部网表分析结果</h2>
<div class="summary" id="summary">加载中...</div>

<div class="actions">
    <button class="primary" onclick="exportCSV()">导出 CSV</button>
    <button class="success" onclick="exportNetlist()">导出网表文件</button>
    <button onclick="reload()">刷新</button>
</div>

<div class="tabs">
    <div class="tab active" data-panel="by-net" onclick="switchTab('by-net')">按网络排列</div>
    <div class="tab" data-panel="by-comp" onclick="switchTab('by-comp')">按元件排列</div>
</div>

<div class="panel active" id="by-net-panel">
    <table id="net-table"><thead><tr><th>网络名</th><th>元件</th><th>引脚</th></tr></thead><tbody></tbody></table>
</div>
<div class="panel" id="by-comp-panel">
    <table id="comp-table"><thead><tr><th>元件</th><th>引脚</th><th>连接网络</th></tr></thead><tbody></tbody></table>
</div>

<script>
var data = { nets: {}, comps: [], count: 0, netCount: 0 };
var rawNetlist = '';

function reload() {
    // Use eda.sys_Storage — IFrame shares eda API with main extension
    var edaObj = (typeof eda !== 'undefined') ? eda : (window.parent && window.parent.eda);
    if (!edaObj || !edaObj.sys_Storage) {
        document.getElementById('summary').innerHTML = '<span style="color:#dc2626">EDA API 不可用，请确认扩展已启用。</span>';
        return;
    }

    try {
        edaObj.sys_Storage.getExtensionUserConfig('netlist_data').then(function(d) {
            if (!d) {
                document.getElementById('summary').innerHTML = '<span style="color:#dc2626">未找到网表数据。请返回原理图框选元件后重新分析。</span>';
                return;
            }
            data = JSON.parse(d);
            document.getElementById('summary').innerHTML =
                '<span>' + data.count + '</span> 个元件 &nbsp; <span>' + data.netCount + '</span> 个网络';
            renderNetTable();
            renderCompTable();
        }).catch(function(err) {
            document.getElementById('summary').innerHTML = '<span style="color:#dc2626">读取存储失败: ' + err.message + '</span>';
        });

        edaObj.sys_Storage.getExtensionUserConfig('netlist_raw').then(function(r) {
            if (r) rawNetlist = r;
        }).catch(function() {});
    } catch (e) {
        document.getElementById('summary').innerHTML = '<span style="color:#dc2626">初始化失败: ' + e.message + '</span>';
    }
}

    // Strategy 2: try storage after a delay
    setTimeout(function() {
        if (!dataReceived) loadFromStorage();
    }, 200);
}

function loadFromStorage() {
    try {
        rawNetlist = localStorage.getItem('__netlist_raw') || sessionStorage.getItem('__netlist_raw') || '';
        var d = localStorage.getItem('__netlist_data') || sessionStorage.getItem('__netlist_data') || '';
        if (!d) {
            document.getElementById('summary').innerHTML = '<span style="color:#dc2626">未找到网表数据(localStorage/sessionStorage均为空)。请返回原理图框选元件后重新分析。</span>';
            return;
        }
        data = JSON.parse(d);
    } catch (e) {
        document.getElementById('summary').innerHTML = '<span style="color:#dc2626">数据解析失败: ' + e.message + '</span>';
        return;
    }

    if (!data.nets || data.count === 0) {
        document.getElementById('summary').innerHTML = '<span style="color:#dc2626">无网表数据</span>';
        return;
    }

    document.getElementById('summary').innerHTML =
        '<span>' + data.count + '</span> 个元件 &nbsp; <span>' + data.netCount + '</span> 个网络';

    renderNetTable();
    renderCompTable();
}

function renderNetTable() {
    var tbody = document.querySelector('#net-table tbody');
    tbody.innerHTML = '';
    var netNames = Object.keys(data.nets).sort();
    for (var i = 0; i < netNames.length; i++) {
        var net = netNames[i];
        var entries = data.nets[net];
        for (var j = 0; j < entries.length; j++) {
            var parts = entries[j].split('-');
            var row = '<tr>';
            if (j === 0) row += '<td class="net-col" rowspan="' + entries.length + '">' + es(net) + '</td>';
            row += '<td class="comp-col">' + es(parts[0]) + '</td>';
            row += '<td class="pin-col">' + es(parts[1] || '') + '</td>';
            row += '</tr>';
            tbody.innerHTML += row;
        }
    }
}

function renderCompTable() {
    var tbody = document.querySelector('#comp-table tbody');
    tbody.innerHTML = '';
    // Build comp → pin-net map
    var map = {};
    var netNames = Object.keys(data.nets);
    for (var i = 0; i < netNames.length; i++) {
        var net = netNames[i];
        var entries = data.nets[net];
        for (var j = 0; j < entries.length; j++) {
            var parts = entries[j].split('-');
            if (!map[parts[0]]) map[parts[0]] = [];
            map[parts[0]].push({ pin: parts[1] || '', net: net });
        }
    }
    var comps = Object.keys(map).sort();
    for (var ci = 0; ci < comps.length; ci++) {
        var entries = map[comps[ci]];
        for (var ej = 0; ej < entries.length; ej++) {
            var row = '<tr>';
            if (ej === 0) row += '<td class="comp-col" rowspan="' + entries.length + '">' + es(comps[ci]) + '</td>';
            row += '<td class="pin-col">' + es(entries[ej].pin) + '</td>';
            row += '<td class="net-col">' + es(entries[ej].net) + '</td>';
            row += '</tr>';
            tbody.innerHTML += row;
        }
    }
}

function es(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function switchTab(name) {
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
    document.querySelector('[data-panel="' + name + '"]').classList.add('active');
    document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
    document.getElementById(name + '-panel').classList.add('active');
}

function exportCSV() {
    if (!data.nets || Object.keys(data.nets).length === 0) return alert('无数据');
    var csv = 'Net,Designator,Pin\n';
    var netNames = Object.keys(data.nets).sort();
    for (var i = 0; i < netNames.length; i++) {
        var net = netNames[i];
        var entries = data.nets[net];
        for (var j = 0; j < entries.length; j++) {
            var parts = entries[j].split('-');
            csv += '"' + net + '","' + parts[0] + '","' + (parts[1] || '') + '"\n';
        }
    }
    download(csv, 'netlist.csv', 'text/csv');
}

function exportNetlist() {
    if (!rawNetlist) {
        var edaObj = (typeof eda !== 'undefined') ? eda : (window.parent && window.parent.eda);
        if (edaObj && edaObj.sys_Storage) {
            edaObj.sys_Storage.getExtensionUserConfig('netlist_raw').then(function(r) {
                download(r, 'netlist.json', 'application/json');
            }).catch(function() { alert('读取失败'); });
            return;
        }
        alert('无原始网表数据');
        return;
    }
    download(rawNetlist, 'netlist.json', 'application/json');
}
}

function download(content, filename, mime) {
    var blob = new Blob([content], {type: mime});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
}

reload();
</script>
</body>
</html>
